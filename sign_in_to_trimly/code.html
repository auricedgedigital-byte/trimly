<style>
        body {
            background-color: #0D0D0D; /* Canvas Level 0 */
            color: #e5e2e1;

        .glass-panel {
            background: rgba(31, 31, 31, 0.15); /* Level 2 fill */

            border: 1px solid rgba(255, 255, 255, 0.1); /* Level 1 stroke */
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15); /* Inner glow */
        }

        .luxury-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #1F1F1F;
            transition: all 400ms cubic-bezier(0.19, 1, 0.22, 1);
        }

        .luxury-input:focus {
            outline: none;
            border-bottom-color: #C59D5F;
            box-shadow: none;
        }

        .magnetic-btn {
            transition: all 400ms cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .magnetic-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(197, 157, 95, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
            z-index: 0;
        }

        .magnetic-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .magnetic-btn > * {
            position: relative;
            z-index: 1;
        }
